name: CoffeeBreak
description: "revamped design"
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.0
  flutter_native_splash: ^2.4.7
  flutter_svg: ^2.2.3
  pinput: ^6.0.1
  supabase_flutter: ^2.8.4
  shared_preferences: ^2.5.4
  flutter_slidable: ^4.0.3
  vize: ^1.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/

